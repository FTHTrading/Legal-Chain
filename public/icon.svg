<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0e1225"/>
      <stop offset="100%" stop-color="#080b16"/>
    </linearGradient>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#d4b868"/>
      <stop offset="100%" stop-color="#c9a84c"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="512" height="512" rx="96" fill="url(#bg)"/>
  <!-- Outer ring -->
  <circle cx="256" cy="256" r="220" fill="none" stroke="url(#gold)" stroke-width="6"/>
  <circle cx="256" cy="256" r="200" fill="none" stroke="#c9a84c" stroke-width="1.5" opacity="0.3"/>
  <!-- Scales of Justice (⚖) -->
  <!-- Center pillar -->
  <rect x="250" y="120" width="12" height="220" rx="6" fill="url(#gold)"/>
  <!-- Base -->
  <rect x="196" y="330" width="120" height="12" rx="6" fill="url(#gold)"/>
  <!-- Balance beam -->
  <rect x="126" y="160" width="260" height="8" rx="4" fill="url(#gold)"/>
  <!-- Left chain -->
  <line x1="156" y1="168" x2="156" y2="228" stroke="#c9a84c" stroke-width="4"/>
  <!-- Right chain -->
  <line x1="356" y1="168" x2="356" y2="228" stroke="#c9a84c" stroke-width="4"/>
  <!-- Left pan -->
  <path d="M116 228 Q136 270 156 228 Q176 270 196 228" fill="none" stroke="url(#gold)" stroke-width="5" stroke-linecap="round"/>
  <path d="M116 228 C116 258 196 258 196 228" fill="#c9a84c" fill-opacity="0.15"/>
  <!-- Right pan -->
  <path d="M316 228 Q336 270 356 228 Q376 270 396 228" fill="none" stroke="url(#gold)" stroke-width="5" stroke-linecap="round"/>
  <path d="M316 228 C316 258 396 258 396 228" fill="#c9a84c" fill-opacity="0.15"/>
  <!-- Blockchain hexagon accent at top -->
  <polygon points="256,80 276,92 276,116 256,128 236,116 236,92" fill="none" stroke="#c9a84c" stroke-width="3" opacity="0.6"/>
  <!-- Chain links at bottom -->
  <circle cx="226" cy="370" r="10" fill="none" stroke="#c9a84c" stroke-width="2.5" opacity="0.5"/>
  <circle cx="256" cy="370" r="10" fill="none" stroke="#c9a84c" stroke-width="2.5" opacity="0.5"/>
  <circle cx="286" cy="370" r="10" fill="none" stroke="#c9a84c" stroke-width="2.5" opacity="0.5"/>
  <!-- UNYKORN text -->
  <text x="256" y="420" text-anchor="middle" fill="#c9a84c" font-family="serif" font-size="32" font-weight="bold" letter-spacing="6">UNYKORN</text>
</svg>
